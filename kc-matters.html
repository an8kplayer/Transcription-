s than those in the world. The aeroplane up to date is the rich man's means of conveyance. Why cannot air fares be raised rather than railway fares? Sir, I may be pardoned for saying so in this House."},
  { name: "Transcription No: 150", text: "Sir, I am mostly in agreement with almost all the principles that the hon. Prime Minister has enunciated this morning, and yet, I beg to submit that from the point of view of logic, I do not arrive at the same conclusion as the Prime Minister has done. I may say, at the outset, that the continued association of my country with the Commonwealth is not justified. The hon. Prime Minister said that it is very easy to destroy a thing, but it is very difficult to build. I agree that the work of an artist who creates something is difficult and it takes a long time to build a thing, but it is much easier to destroy it. This world of ours is not being created now. It is not something new which is being just brought out. It is in existence with all its faults and good points and like who is not creating a new thing but who is taking the buildings as they exist and then harmonising them by trying to join them together, and in that task it sometimes becomes necessary to alter certain things here and there, and sometimes even to destroy a small portion. Similarly, in the small world of ours, when in the interest of a greater harmony, to build a world with possibly a World Government, with freedom for all and with chances of development to every nation to the fullest extent, it is possible that some of the old associations may have to be severed. The British Commonwealth started as a British Empire. It had a purpose in this world. Whether it was a colonial purpose or some other purpose, it came into existence with a certain set purpose. And then, as the world went on changing, the British Empire also went on changing. Then it was the British Commonwealth and, lastly, that word 'British' was dropped. The hon. Prime Minister said that the United States of America has a closer relationship with the Commonwealth than even India. I support the hon. Prime Minister's statement and that is just the reason and just the argument in my favour. If the United States, without being in the Commonwealth, can have as great an association with it, or even greater association with it than we have, then, Sir, our country, India, remaining outside the Commonwealth, can also continue the same association. Sir, the hon. Prime Minister was vehemently against the S.E.A.T.O. and Baghdad Pact and all those things that he thought were against the spirit of the United Nations. He said that the nations can have regional associations. Sir, you will realise that the Commonwealth is not a region. Australia, India, Canada and the United Kingdom are so far apart geographically that nobody in his imagination can consider them to be a compact area where there may be some sort of an understanding or co-operation. We are aiming at peace and for the attainment of that peace, we have a world organisation, the United Nations. Do you think that the formation of packs or groups or associations helps in the development, better organisation and control of the United Nations? On the other hand, these petty associations, packs, pacts and treaties retard the influence of the United Nations, defeat the whole purpose of the United Nations. I submit that these associations are a step in the wrong direction. Sir, I come to a few mundane matters. We have our trade relations largely with the United Kingdom. If you see the structure of our import and export trade, you will find that a large part of export goes to the United Kingdom and a large part of our imports comes from the United Kingdom. We are giving some sort of a preferential duty. That preferential duty creates problems for us. Commercially, we find that the cost of production in the United Kingdom has gone up much higher than in any other country. If it is a question of import of machinery, we find that other nations are able to offer us better terms. If it is a matter of our export trade, we find that other nations are able to offer us better prices. This link with the Commonwealth was linked up with the Sterling. Sir, you know that in nineteen fifty-eight the Sterling was worth about five dollars. Then, the Sterling was devalued to two dollars and eighty cents. The value of the pound came down by nearly forty per cent. We had to devalue our currency because we were linked up with the Sterling currency. If it had not been linked up with the Sterling, it would have had to be appreciated by forty per cent. Thus perforce, we had to rearrange our entire fiscal policy in this way."},
