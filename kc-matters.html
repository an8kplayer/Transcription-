const KC_MATTERS = [
  { name: "Transcription No: 133", text: "Mr. Chairman, Sir, may I have the opportunity to participate in this debate? This is a private Member's Bill and I want to congratulate the mover of this Bill for having brought this Bill. A very important subject has been raised that right to work should be made a fundamental right. Right to work is the birthright of everybody however poor or however rich, whether a man or a woman. We have right to property as a fundamental right in our country, but it is really sad that right to work which provides right to live should not be made a fundamental right and should only be a Directive Principle. Why has this happened? Why could it not be made a fundamental right till now? It is known that once it becomes a fundamental right, it becomes justiciable. That means that a person can go to the High Court or Supreme Court and say that it is his fundamental right and he must get a job. But as the Government was not sure that it would be able to provide employment to every citizen, it did not do so. Because a fundamental right cannot be made only for a particular age group; it is for all citizens and every unemployed citizen can come to the court and claim his right for a job to be given to him. That was the real apprehension, reluctance on the part of the Government, but this helps us to raise a larger economic issue of how we can create conditions in our country where every work-worthy person would have a job. It is this subject which is being debated and this is what should be debated as the most important subject in the Parliament and in the country today. Unfortunately, I find very few people taking interest in this. Today, if we just introspect and sit a little coolly and consider how much energy is being wasted on trying to win debating points, trying to be sensational, trying to have mere superficial debate in this country, we will find that we are doing that too much. But the real issue is how to provide employment to every young man of this country because after all what is socialism. When we say that we have pledged ourselves in the Preamble that we will establish a democratic, socialist, secular, sovereign Republic, what does it mean? What is socialism? It means all members of our society must have an equal opportunity to live a decent human life. Such conditions must be created in our society where every single individual should have that right, that is the simple meaning of the word 'socialism'—a society where a few do not have an opportunity and a right to exploit and extort. Such a society should be created and this is what socialism means. And to bring it about within the framework of a democratic structure, i.e. by the will of the people, is the meaning of the concept which our founding fathers have enshrined in the Constitution when they said that we will have a democratic, socialist society. Let us ask ourselves this question: Have we succeeded in doing it? When I am participating in the debate today, I am not going to speak from the point of view of winning or scoring the debating points between people on this side or that side. I think it is the duty of all of us. These people in this House and in that House, who have been entrusted by crores of people of this country with the task of doing something that will change their destiny and change their life, it is incumbent on us to sit down and to give the topmost priority to consider as to how we can achieve this. And if this is given priority, I am sure a way can be found. Instead of wasting our energy on other matters, let us concentrate on this matter. I am absolutely one with my friends when they say that this should be given the top priority. What do the young people of this country expect? Why are they restive? Why are they frustrated? It is because they are not employed; they do not have productive employment, creative employment. That is why they feel frustrated. By and large, if this is the fact, Sir, then let us consider how this can be achieved. If you want to provide employment, employment must be productive. What is wealth? Wealth is goods and services. It is not notes—the currency notes are actually the means of exchange. The wealth is goods. When do you say that a man is poor? It is when he is not able to have even the necessities of life. Now, how can you make them available to him? Obviously, first they must be produced and then he must have the purchasing power to buy them. How can he have the purchasing power unless he has remunerative work?" },
  { name: "Transcription No: 134", text: "In view of the recommendations made by the Backward Classes Commission, the Government of India examined the matter in consultation with the State Governments concerned. This is exactly what we have decided and what has been incorporated in the present Bill. As a result, it has been decided that in the case of Rajasthan the area restriction should be removed altogether, because in Rajasthan this population has been spread over a very large area. It was found that they were entitled to this measure of protection and, therefore, this area restriction has not been kept up in respect of Rajasthan at all. In the case of the other two States, namely, Maharashtra and Madhya Pradesh, the tribes residing in tehsils where there is concentration of twenty per cent or more of tribal population should be specified as Scheduled Tribes. This is point number two so far as the salient recommendations of the Backward Classes Commission were concerned. Then, Sir, the third point was regarding the actual omissions or actual additions. There were a number of communities. In respect of this, there are certain difficulties which I shall be pointing out very soon. So far as the Backward Classes Commission's recommendations in this respect were concerned, there were certain natural handicaps. When we received their recommendations regarding either additions or omissions, naturally we had to depend upon the well-considered views of the State Governments. As I stated to the House, there was a double reference. The first reference was at the preliminary stage and the second reference was with regard to the tentative proposals that the Government had evolved. Therefore, in this case, after the receipt of the views of the State Governments, the Government finally re-cast what they had prepared in the light of these views. Generally, what has been done is when there has been a recommendation which is supported both by the Backward Classes Commission and the State Government, then we accept that particular community either for addition, if formerly it was not there, or for omission, if omission has been jointly supported by both these people. If, for example, there is a difference of opinion between them, then the Government considered the matter. I would point out that the State Governments have a number of means of knowing the correct position so far as these are concerned. So far as the Backward Classes Commission was concerned, there were certain handicaps, as pointed out to you, and there were certain views to follow to the extent it is necessary. In a few cases, naturally we had to come to certain conclusions irrespective of the view either of the Backward Classes Commission or of the State Governments. But such cases are not many. And then, after considering all these things, you will find, we have prepared the list, the names of the various communities attached to the Bill, which ought to be recognised so far as either the Scheduled Castes or Scheduled Tribes are concerned. One more important question arises so far as the number of these communities is concerned. That was a very difficult task. Now, what happened was naturally representations were made to the Government and we ought to give up encouraging or perpetuating that caste system. And, therefore, when the census had to be prepared, the question arose as to whether Government should have the enumeration in respect of the members of the separate castes through their officers or whether the enumeration should be confined as well to the groups or categories of Scheduled Castes as a whole and Scheduled Tribes as a whole and the Bhil community. In some of the former census, on account of these communities shown separately. But in the census that took place, there was this view that the Government should not amalgamate all of them under these two recognised heads, namely, the Scheduled Castes and Scheduled Tribes. The desire was to not go on perpetuating the various castes and tribes. Therefore, a separate enumeration as Bhil was not done. What I am mentioning is only one community, that he belonged to a particular tribe, when the man stated that the enumerator found out whether he was one of a caste, then his name was shown in the category of the special community without mentioning the Scheduled Castes or Scheduled Tribes recognised by the President's Order. Then, afterwards, this Commission was appointed. One of the results of the appointment of this Commission was naturally the accentuation of the emphasis on castes and tribes. Every community began to plead because after all certain rights were given. And, therefore, every community was advisable to claim that either they thought it was a Scheduled Caste or a Scheduled Tribe." },
  { name: "Transcription No: 135", text: "Now, Sir, I know that this Plan has just started, and it is perhaps too early for us to say anything about it. But we have before us the experience of the Nine Five Year Plan. Sir, we had been told that due importance would be attached, not merely in words but by practical steps, to the public sector. I think in this connection it was the duty of the hon. Minister to have explained to this House as to the steps that had been taken with a view to bringing about the kind of reorientation in favour of the public sector which was promised in his numerous statements. But I find that that is completely missing from his speech, except that a pious wish has been expressed with regard to this particular sector. Previously, we had under the purview of this Act about 42 industries. Now, the list has lengthened and a number of industries will be added. I concede that when we are having a planned economy, when we are thinking in terms of rapid development of industries, of rapid industrialisation, it is necessary for the Government to come into the picture more and more and assume the necessary control and direction of industries. I am not opposed to it at all. On the contrary, I would like them to vigorously examine as to whether the direction, regulation—or whatever you call it—is on the right lines; how it has worked. We have got such general statements from the Ministers that they do not throw much light for us laymen on the matter. I wish that when such measures are brought before the House, a kind of white paper—or whatever you call it—is circulated among the Members. You do not expect that we, laymen in this House, would easily understand these things until and unless we have some opportunities of studying the relevant data and the material on the subject. We have been denied those opportunities and I regret that we have been so denied. I know that in this respect hon. Members who come from big business or the business world would be in a somewhat advantageous position because they are familiar with the working of this Act in a way which would enable them to speak more effectively. Now, let us see how this has worked. I know that when this measure was first brought before the House several years ago, there was much opposition to it, which came not from the public but from certain business interests. They did not like any kind of Government interference in industry. They believed in a kind of laissez faire in this matter and they thought that if the Government came into the picture, their interests would suffer. Naturally, they were openly hostile to these powers for the Government, but that was not the view of the country. I think that, by and large, public opinion was in favour of Government controlling industries, not the type of control that we had at the time of the World War but a type of control which sets before itself certain objectives and as the objectives became clearer and clearer, as the Government pronounced itself more and more in favour of industrialisation in the country, public opinion strongly veered round to that particular point of view of the Government in this matter, viz., that Government should have control over our industries. But it is the Government which has not lived up to its promises. I think that in some respects they have let the people down and the expectations of the people have been belied. Now take, for instance, the period between 1991 when the measure was first adopted and now. What do we see? We do not have compact figures for the entire period. We have got only certain figures with regard to this matter. I would refer only to the Progress Reports on the Seventh Five Year Plan. There, you will see that the Government had not taken any very effective steps for the development of the public sector. It is true that certain steel mills got going under the Seventh Five Year Plan and more will be started under the Eighth Plan, but if you look at the picture, you will find that the public sector was considered to be a secondary matter. It was the private sector which got all the attention and assistance of the Government. I am not at all suggesting that Government was totally unmindful of the public sector. What I am saying is that when the Government entered into the picture, it did not give to the public sector the attention that it deserved. I think that the hon. Minister owes us an explanation not only as to why such a thing happened but also as to steps he is going to take with a view to changing the pattern of such development." },
  { name: "Transcription No: 136", text: "Now about the Secretaries. Generally, there is one for each Department and he wants Joint Secretaries, Deputy Secretaries and so on. There is a whole army of Secretaries; I do not know how many we have got. It is very difficult to keep pace with the growth of the Secretaries in our administration. When the British left, there were a few; now there are too many. I am not at all suggesting that the number should not have increased. Our Prime Minister is quite right in saying that the administrative work has increased many times, fifty to a hundred times. I do not know whether it is fifty times or a hundred times. But much of the work is not worth having because if you assess the work properly, then you will find some of the useless things need not be there at all. However, I concede that point that we would require perhaps more ministerial servants in the various Departments—more Under Secretaries, Assistants, stenographers, clerks and so on. I concede that point. But are we not having too many Secretaries? I know what work they are doing. Is there any proper check on that? Most of the work that goes in their name is actually done by people about whom we never discuss, who are never recognised, whose merit we do not take into account. In our country, the men in the lower rung of the ladder of this public administration—these Assistants and others—do a lot of work and it is a very good thing. We are a cultured people, we are a civilised people and we are a people with initiative. Now, when they feel that they are the functionaries of the Government, naturally they would like to put their very best, and in fact they are doing so. Unfortunately, their efficiency is not given either due recognition or due incentive which is required in order to tone up the administration and improve the affairs in our public administration. We should reject this idea of administration by the Secretaries. We have got a Parliament; we have got a Ministry which is supposed to be responsible to the Parliament. Howsoever irresponsibly at times it may behave, constitutionally it is supposed to be responsible to Parliament. And then we have got a big administrative set-up of the Government of India.There are people of efficiency, people who are not recognised, who nevertheless discharge their duties efficiently. We want to improve the pace of the administration. That is the crux of the problem. You cannot have initiative and efficiency until you have our administration democratised. There is bureaucratism; there is soullessness at every point in our administration. I do not know how many of you have talked to the Secretaries of the various Departments. I have talked to some of the Secretaries but sometime I feel as if I were talking to useless persons. One does not see any reaction on their face. I feel that it is a machine that I am talking to. It depresses me and I am sure many other people also feel depressed. So all these Secretaries of these Departments have to be responsive to criticism and to the wishes of the public. They should be democratised and it all depends on how you talk to the public, how you listen to them, what you gather from what the people say. Not that they always say the right things, and sometimes they say very good things and such things should be properly gathered. This is not done. Therefore, what is of vital importance in our country for us for improving the public administration is to democratise the administration and do away with the bureaucratic cold-bloodedness that exists in our public administration today. That is of vital importance. I stress it again and again because the crux of the problem lies there. Initiative has to be developed at the lower level by entrusting more responsibilities to the lower officials and by giving recognition to their services and also making it easy for them to work. Their conditions of service have to be improved. Their emoluments must be made adequate to make their life worth living. All these things are important for improving our public administration. As far as the public undertakings are concerned, I am totally opposed to the bureaucrats or representatives of the big money being placed in positions of authority in public undertakings. There are people—no matter in which politics they belong—who are efficient, who are devoted and who can discharge their functions very ably in all walks of life. You can find people from among the common folk who could be placed in those positions. Sir, life insurance has been nationalised. What do we find there? It is a public undertaking of great importance to the country. There, you have got the same people; the old furniture is placed with some sort of rearrangement." },
  { name: "Transcription No: 137", text: "Before putting forward a measure of this nature before Parliament, we had given considerable thought to certain aspects of cloth prices as they exist today, and it is only because we felt that this is the only means now open to us which can, to some extent, act as a deterrent against high prices and, where it fails to do so, would be able to absorb the margins of profit that go to the trade and industry that we sought to bring in this measure for the approval of Parliament. Sir, the factual position which has been described in the note might be summarised thus. The existing capacity in the mills is being utilized to the maximum extent. In fact, Sir, in July, the production of textiles has been an all-time record of five hundred million metres. Hon. Members might say, Well, if that is possible, why do you fear that there is going to be scarcity of cloth? In fact, I think it is the possible scarcity and the high prices that have induced these people to stretch a point and make the mills produce a little more, though certain factors helping to increase production have been accidental, namely, in July, the working days have been the largest in number. The other fact is, Sir, that we are not in a position within any measurable distance of time to increase the capacity of the mills both in regard to its looms, that is, weaving, and in regard to its spindlage, that is, spinning. The spindlage in the mills is frozen. We are not adding to the looms except for the recent decision that we have taken that we should add to the mills by way of automatic looms intended specifically for promotion of export of cloth and, so far as spindlage is concerned, that has been restricted to an increase over a period of one and a half years to about two million spindles, the licence for bulk of which has already been granted and this decision had been taken on the basis of an estimate of consumption of eighteen metres per capita during the Eighth Five Year Plan and towards the end of it. When that decision was taken, Sir, Government were not unconscious of the fact that that target would not be a correct one and in an expansionist economy, that target is likely to be exceeded but that target figure was tentatively accepted mainly because it happened to coincide with the recommendation of a committee which, inter alia, dealt with the requirements of the people in regard to cloth, that is, the Ramamoorthy Committee, and, therefore, Sir, if the guilt is laid at the doors of Government, I will have to plead guilty, namely, that we were not in a position to envisage the rapid expansion of consumption. The figures that I have furnished to hon. Members will indicate that while the consumption figures per capita last year, that is, for nineteen ninety-five, would be two hundred and ninety-six, there has been a rise during the first half, and that unless the price factor, the scarcity factor and other factors operate to diminish the total consumption, the rate of consumption might undoubtedly increase. Of course, there is a limiting factor because cloth has to come either by inhibiting exports or by an increase in production or by an increase in the handloom sector; and in these three cases, we have almost reached the maximum point where we can expect additions to the total cloth consumption. So it is possible that cloth consumption might go up to seventeen metres and is not likely to go beyond that merely because of the fact that cloth will not be there. Probably, if the cloth is available and if we allow people to consume the cloth freely, well, the consumption per capita might exceed seventeen metres by the end of the year. But it is certainly indicative of the fact that in the first year of the Plan, we have only got a margin of one metre per capita. We have also got to realise that the amount of money that is being pumped into the country and, to some extent, into the hands of the lower income groups will have one effect, namely, certain commodities like cloth and sugar and commodities of that sort which have been considered to be features of necessities in consumption in the past would have become more elastic articles of necessity, and be transferred from the semi-luxury state. In such a case, twenty or twenty-one metres seems to be well within our possibility of achievement as a target. There is undoubtedly a background behind this restrictive attitude in regard to addition of capacity and that is, to some extent, sentimental and, to some extent, economic and deliberate. We want to help the decentralized sector in this industry; the handloom sector has to obtain protection against the weaving mills" },
  { name: "Transcription No: 138", text: "Then, Sir, some attempt has been made to introduce certain elements in the present Constitution (Amendment) Bill, but naturally other details and further elucidations are out of the purview of the present Bill, and therefore a new Bill will have to be brought forward to the extent that it is necessary for incorporating these provisions. In the meanwhile, I would assure the House that Government have made arrangements and will take steps for having interim advisory bodies etc. so far as all these areas are concerned, and then immediately in the next session or, if that were not possible, in the session after the next, an attempt would be made to place before this House a Bill or Bills for broadly carrying out the scheme, especially the administrative scheme, that I have explained to this House. There will of course be, in addition to these bodies, so far as Delhi is concerned, a Delhi Development Authority. All these are necessary because Delhi is the capital and all attempts have to be made to make Delhi as model a city as possible. Now, the next item with which this Bill deals is what is known as the safeguards for linguistic minorities. Now, this would apply to two or three States. So far as this question is concerned, one is that we are dealing only with linguistic minorities, not any other minorities at all, and we are generally following the line that has been laid down by the States Reorganisation Commission. The States Reorganisation Commission rightly pointed out that even after the reorganisation of States, there would remain a large population speaking languages other than the territorial language of the particular State. Now, so far as these people are concerned, certain safeguards were considered essential. In the first place, we have to note that all inhabitants in any part of India, State or Union Territory, are the citizens of India. They have a common citizenship and the rights of common citizenship will naturally be available in all respects so far as the linguistic minorities in different parts are concerned. But it is essential that as far as possible the interests of the linguistic minorities should be safeguarded to the extent that it is necessary. The States Reorganisation Commission have pointed out in this respect that after all these linguistic minorities are the citizens of India. Now, Sir, so far as the States Reorganisation Commission was concerned, it was stated that, as far as possible, there ought to be no statutory safeguards as such, except to the minimum extent, and whatever it has stated has been accepted. It was stated that in respect of the rights of the children of these linguistic minorities, there ought to be a statutory provision, and that they ought to be taught through the medium of their own mother-tongue at the primary school level. Now that has been accepted. In the Bill, so will you find, a new provision has been made in the Bill so far as the secondary education stage is concerned. The other questions are many, as for example, to what extent there should be the language of a minority as a medium of examination in middle schools and in colleges; or whether it should also be a medium of administration in Government offices. Now, Sir, there is another question also which has been raised, namely, the question of domiciliary rules. There are certain States where certain rules are made according to which it may be difficult for the non-residents in that area to acquire certain rights. In some cases, very long periods have been laid down. If not, in one case, twelve years residence was prescribed, and that was considered rather inequitable. As you are aware, Sir, in this respect, the Constitution has stated that if, for example, there are any such rules which had the force of law at the time when the Constitution was inaugurated, then they would continue to have the force of law until Parliament makes a law in that respect. We are considering that aspect of the question also. Then, Sir, the important question that has to be noted is that if we have a common citizenship, then the question arises whether it would be open, or it ought to be open, to the various State Governments to lay down certain rules which are likely to be complained of as discriminatory provisions, so far as the acquisition of property is concerned, or so far as the admission to Government services is concerned. Therefore, Sir, the whole subject is under the consideration of the Government of India, and we are anxious to evolve certain provisions. Therefore, Sir, coming back to the linguistic minorities, what has been decided is this. It was suggested that the Governor should have the right of finding out the solution for this and giving property rights to all citizens in his State." },
  { name: "Transcription No: 139", text: "Mr. Deputy Speaker, Sir, there is a ban on transporting agricultural produce from one part to another part of the country. During the last session, the hon. Minister had announced that this ban will be lifted, but it has not been done till now. The farmers are unable to take their produce to any part of the country. As a result of total neglect towards agriculture, the allocation given to this field has decreased from four per cent to three per cent in the annual plan outlay. The allocation for National Bank for Agriculture and Rural Development is going down in every annual plan in comparison to the annual plan of nineteen ninety-two-ninety-three. Similarly, only six per cent amount has been provided for loans and electricity. There has been no considerable increase in it in the last year. This step of the Government is totally unjustified towards the farmers and agriculture. The continuous decrease in the ground water level is also a matter of grave concern. Ever since the Congress Party has come to power, there has been over ten per cent difference between the estimated capacity and actual utilisation of irrigation potential. If this gap had been filled, it would have increased the food grain production. Not only our country would have become self-reliant in food grains, but it would have been also able to export them. Several big projects are lying pending and near about seventy per cent of land is deprived of irrigation. Same is the condition of forest areas also. Wherever there are Congress Governments, they have grossly violated the interests of the farmers. The network of multinational companies is spreading in our country which will create problems for the farmers. Their interests are being mortgaged in the hands of foreign powers. Due to this reason, the country is becoming dependent on others for food and it can jeopardise our political and social freedom. Mr. Deputy Speaker, Sir, it is bad luck that our farmers are not organised today. But the day they become organised, they can revolt. Since the time this Congress Government has been formed, it is not even ready to accept rightful demands. Unless such activities as sabotage, economic blockade and gherao are adopted, the Government is not able to understand the problem. So, I would like the Government not to create so much problem for the farmers that they are compelled to revolt. Mr. Deputy Speaker, Sir, my party and myself totally oppose the Dunkel proposals. It is very regretful that these proposals have caused infighting among the Cabinet members. One of your Ministers says that export of our proposals and acceptance with the Dunkel proposals will destroy our country. So, there is difference of opinion in the Cabinet also. One Minister is opposing while another Minister is supporting the Dunkel Proposals. When there is so much difference of opinion in the Cabinet itself, what right Ministers should go; the Minister who is opposing his Government's policy should resign. If the Government is ready to accept the Dunkel proposals, the Agriculture Minister should resign, and if the Government is not accepting the proposals, the Commerce Minister should resign, as he was praising the proposals. When the farmers resort to agitation for their demands, the entire Government will have to resign. Mr. Deputy Speaker, Sir, our country is severely affected by drought at present. Orissa, Bihar, Maharashtra and eastern part of Uttar Pradesh are affected by drought, but our Central Government decides everything in a haphazard manner. The Prime Minister surveys a State once and gives Rs. ten crores, Rs. twenty crores or Rs. fifty crores. Then he goes to another State. Such a haphazard manner cannot solve the problem. There should be a permanent solution. Even after sixty-five years of Independence, the Government has not been able to control drought. Maximum rain water has not been wasted and there is no storage facility. Sir, Andhra Pradesh is also severely affected by drought and the situation has become so worse that the farmers are forced to kill their own children. Neither there is fodder nor water for their cattle. Sir, it is just the opposite in Karnataka. It is affected by floods which have caused a lot of damage. On the one hand, there is devastation due to heavy rains; on the other hand, there is suffering due to drought. I have read the draft of the agriculture policy. I do not think that the hon. Minister of Agriculture has paid any attention towards this problem. I would like to submit that this agriculture policy is unfavourable to the farmers. No facilities are being provided to them and agricultural inputs are being made costlier. Injustice is being done to them. Eighty per cent of the cultivators and the Government should think about their welfare. If this is not done, then eighty per cent population will resort to agitation, as I have said earlier also." },
  { name: "Transcription No: 140", text: "Mr. Deputy Speaker, Sir, at the outset, I would like to express my heartfelt thanks to you for having given me an opportunity to participate in this discussion on the Demands for Grants of the Ministry of Agriculture. Sir, this Government is going to complete its two years term on nineteenth June, nineteen ninety-three. In the last two years, I have been closely watching how this Government is taking keen interest to help this unorganised sector. This is the major rural sector comprising about seventy per cent of the population, but in all the three Budgets which they have presented before this House, I am sorry to say, the Government has not shown any keen interest. In the first Budget, we demanded the Government to agree to constitute a Committee to go into the pricing policy of fertilizers. Ultimately, a portion of the recommendations of the Joint Parliamentary Committee, which suited the Government, was accepted and the fertilizer decontrol was done. Now, I would like to say how this Government has taken a callous attitude towards the farming community. In the last Budget, various concessions were given only to the affluent sections of the society and not to the farming community except a reduction of the excise duty on tractors which are above eighteen hundred cc and the tractors which are below eighteen hundred cc have not been touched. Of course, the hon. Finance Minister, while replying to the general discussion on the Budget, had said that the Prime Minister is considering to give certain concessions as far as the fertilizer prices are concerned. All of a sudden, what made the Government to reconsider the question of reducing the prices of fertilizers to give some concessions? It is because all these friends who have got various political ideologies have shown their bit of mind and said that this time they are going to move a cut motion to see that the Government agrees to reduce the fertilizer prices. So, at this stage, I would like to make an appeal to all sections of the House, irrespective of the political parties, and to such of those Members who are really interested in uplifting the farming community, to forget the party alliance. At the time of voting, everyone is also equally interested to see that his farming community is given its proper due share. The Central Government claims that they have removed all shackles through the new economic policy, market economy, liberalisation, de-licensing, amendment to the MRTP Act, etc. But they have done it only for the industrial sector. Some of those people have been really enjoying the benefit for the last forty-seven years after Independence, the last seven Five Year Plans, structural reforms or the economic reforms or the export policy changes or whatever they may be, they are only having an eye towards those people, and these changes have been made for those people. I would like to ask this Government what are the types of structural reforms they have thought over for the farming community. You are amending the MRTP Act. The industrialists can make any amount of investment; there is no restriction for these people, any amount of profit. So, there is no restriction for these people. Unfortunately, for the people who come from the rural areas or the people who are actually the tillers of the soil, they have got all restrictions or whatever it may be. They cannot hold land more than ten acres. Land Reforms Act has been implemented and in some States there may be a little bit of lapses. I do not want to enter into that controversy at this stage. There is no ceiling on income so far as these oppressed sections are concerned. There is no ceiling on income as well as no ceiling on urban land or the urban property. But you have enforced the ceiling on agricultural property because they are not the organised people. About lending also, I would like to make a mention. Farmers have to go from pillar to post. Various types of financial institutions have been created for financing the farmers. But to what extent are we going to include the agricultural sector as a priority sector? We have only fifteen per cent of the bank deposit is going towards the farming community. The agricultural sector contributes about thirty-two per cent of the GDP whereas the loan or the bank advance is only fifteen per cent for this so-called priority sector. So far as industrial sector is concerned, it comprises only eighteen per cent of the population and their contribution in terms of GDP is hardly twenty-six per cent. They get about forty per cent of the bank loan. Again, even to get this forty per cent loan, the farmer has to go to land development bank, central cooperative bank, rural cooperative bank, commercial bank and so on." },
  { name: "Transcription No: 141", text: "Sir, when I take part in the discussion, first of all, I wish to point out that the Sarkaria Commission was not given a free hand to examine the developments which had taken place in the last forty years in India. The main important point is the terms of reference. By the terms of reference, certain parameters had been fixed. Within those parameters, the Sarkaria Commission submitted its report. There are more than two hundred recommendations. Due to lack of time, it is not possible to deal largely with all these recommendations. But, at the same time, the Commission has tried to find out the past history of India. The Commission has said that too much centralisation was objected to from the Mauryan period to the Mughal period. The Commission has stated the fact. Similarly, under the British rule also, centralisation was actually objected to by the people. The founding fathers of our Constitution were painfully conscious that the feeling of Indian nationhood was still in the making and required to be carefully nurtured. They, therefore, built a constitutional structure with a powerful Central Government envisaging the emergence of an indivisible and integrated India. The concept of a strong Centre which was necessary to meet India's immediate needs was virtually, in the later period, converted into the concept of a unitary State with priority for the Centre in all cases. This was the basis of the process of excessive centralism, with all powers in the hands of the Centre. India is developing on the path of capitalism, especially monopoly capitalism. When monopoly capitalism develops in a country, it is then natural that the general argument will be for centralisation of the powers in the hands of the Central Government because they want to protect the interests of the monopoly capitalists and also help the capitalists. So, that is the natural argument for the last so many years. But over-centralisation has taken place and we know that it has taken place. What is the result now? Many are talking about the unity of the country, about the integrity of the country. But what has happened in the States? Communal forces have grown, divisive forces have grown, and the integrity of the country has been jeopardised. When the powers were vested in the hands of the Centre, why has the Centre failed? The Khalistan movement is there and there are other movements also, secessionist movements. Now, some people are demanding a Jharkhand State, and there are all developing. There was a similar demand in Darjeeling. But other fissiparous tendencies are growing and the Centre has not been able to control them. The Centre has not been able to prevent them. But they think that unity of the people has to be maintained, that the unity is only for the Centre, and not for the States. The question of Centre-State relations in India is not a question concerned only with the implementation of federal principles or with the violation of those principles or with suggesting a few Constitutional amendments, but it is concerned with the question of maintaining the sense of Indianness or Indian oneness among all the constituents of the Indian Union with the Centre as the expression of that unity, which has enabled us to maintain that unity. But for maintaining that unity, the constituent units have not received any reward in the integration of the units because each constituent unit consisted of big territories, each with its own language and heritage. In these huge linguistic national units, their linguistic identity and sense of unity grew side by side with the identity bestowed on the Union. So, a deep thought has to be bestowed on how to maintain the unity with the support of the people, with the support of the States. But that is not the concern of the Government. The Sarkaria Commission has been able to make certain recommendations within certain parameters. Even within those parameters, two recommendations are there which are neither advisable nor necessary. One is that it is neither drastic change in the basic character of the Constitution. The second is that the electoral system can be continued like this. In the second recommendation, the Commission says that it certainly calls for improvement and reform in a number of aspects. The actual working of the Constitution leaves much to be desired. It has said about the changes proposed in the financial aspects of the Indian Union and the States. The arrangements are far from satisfactory. It has said about the role of the Governors, reservation of State Bills for consideration of the President, use of extraordinary powers, etc., etc. The Commission has said about the Inter-Governmental Council with a comprehensive size, Council having a nexus with the Planning Commission, limitation of the Centrally-sponsored schemes, State finance and planning, etc., etc." },
  { name: "Transcription No: 142", text: "There is, however, one recommendation of the Press Commission which seems to have been omitted when making the provisions of this Bill. The Commission had said that on the Council representation must be given to the periodical press also, i.e., the weeklies and others. I find that omission here. I feel that in our newspaper world, these periodicals, these monthlies, fortnightlies and weeklies do play an important part, especially in moulding public opinion and in the dissemination of knowledge. Therefore, I think that the recommendation of the Press Commission that some representation ought to be given to the periodical press also, must be considered in this connection. It seems to have been omitted here. That is what I have to say at this stage regarding the composition of the Council. Next, I come to clause 14 of this Bill which is a very vital clause. I was happy to listen to the hon. Minister when he stated that it is the accepted canon of journalistic conduct not to disclose the source of information. If you go through the history of journalism in India, you will find that our top men in the newspaper world had refused to divulge the source of information and they had to suffer for it and because of such suffering, the prestige and self-respect of the profession have been very much heightened. No journalist worth his salt would disclose the source of his information, not because he is so anxious to keep his own self-respect but because he knows that it is vital for the profession as a whole. If you want an independent Press, if you want your newspapers to play their part in the field of public opinion, if you ask them to disclose the source of their information, then the very spring of independent journalism would be touched and that is not a desirable thing. The hon. Minister has himself explained that point and therefore I need not labour that point any more. I however find that clause 14 expressly lays down that the Council has the power of requiring discovery and production of documents. If you call upon a correspondent or the owner of a paper or a publisher, in many cases it would be impossible to withhold the source of information. You cannot withhold the source of information and, at the same time, discover and produce the documents.We have given notice of an amendment. Even if you want to continue the existing provision, you could provide for an exception saying that the journalists must not be required to disclose the source of information. It is not a question of just the newspaper people and the public being apprehensive over these things. Here is a provision which has been expressly put there. Of course, you can say that eminent journalists will be there on the Council and that we can expect the leaders of the newspaper world who can be expected to be elected to this Council to pay proper heed to the professional standards but it will be better if you were to put an express provision in the Bill itself. Now, the newspapers reflect political opinion of the country and there are bound to be sharp differences and, however much we may try, it may not be always possible to keep within the limits. By this provision, you are giving them a handle to force an unwitting journalist or somebody holding a different view to disclose the source of information that is not called for. Coming to the other general powers of the Press Council, it is true, as mentioned by the hon. Minister himself, that the powers granted to this body are far more and go far beyond the powers granted to the British Press Council in the particular statute. I quite follow that. The penal provisions therein have not been called to use. As the Minister himself made it clear, it is just a sanction. The body to be created will enable the profession and the industry to regulate themselves. It is some sort of a voluntary thing which is there. A sanction will have its own way but then there is this power to summon witnesses and, as I have already mentioned, requiring them to produce documents and other things. When you give all these powers, at least some of us feel that in the present set-up in our country, these powers are a little excessive. They are not called for in the present conditions existing in our newspaper world. Some of these powers have not been found necessary to be given to the British Press Council even and, yet, we are investing our Press Council with such powers. It will be a rather hasty experiment to make, in entrusting our Press Council with these things. The question of censure is there. After all, we want our journalists and our newspapermen to voluntarily enforce a conduct and try to improve their standards of journalism which will always be in their own interest." },
  { name: "Transcription No: 143", text: "Sir, I was referring to the clause which relates to the translation of works. As I said, the main purpose which motivated the Joint Committee to make this provision was that opportunities should be given to people to take advantage of the work written in various languages. It is only through translations that culture can be disseminated in this country. Ours is not a uni-lingual country; it is a multi-lingual country. And if we put restrictions in the way of translating works, we put restrictions in the way of the advancement of knowledge itself. It is therefore necessary to make the process of translating works from one language to another an easy one. It was with that purpose that this provision was made. I must say that I do not see the force of the arguments which have been advanced against this provision. It does create some hardship to some extent for the authors, because they are deprived to some extent of their rights after a period of ten years. I am, however, willing to accept the amendment which has been proposed by my friend, Mr. Sinha, with slight alterations. There is some advantage in it. The amendment which has been moved by my friend is on the lines of the Universal Copyright Convention to which India is a signatory. Some Members have suggested that the right of translation of original work should be co-extensive with the copyright for work. If we accept that suggestion, for a period of fifty years, it would mean that it would not be possible for us to translate the works of foreign authors for a period of fifty years, because they will enjoy the same privileges as authors that Indian languages enjoy in this country. Now, we know that Indian literature has to go a long way to enrich itself. We have to produce not only original works in our own languages, but we have to translate many works from foreign languages. If we make this right of translation co-extensive with copyright, it may mean that we shall not be able to translate the works of foreign authors, and I am quite sure that the House would not like to put that barrier in the path of intellectual advancement. Therefore, the best alternative, under the circumstances, is to accept the amendment which has been very ably and very thoughtfully moved by my hon. friend. I have every sympathy with the authors who, in this country, live under very difficult circumstances, but we have also to consider the interests of posterity, the future generations. We must consider the interests of our society in general. If we think of the authors only and make this right co-extensive with the term of the copyright, what would be the result? Probably, the authors may gain but it would be to the detriment of the general interests of the society. I am therefore satisfied with the amendment which has been moved by my friend. It meets the interests of the authors; it also meets the interests of the general public. We have to reconcile the conflicting interests. Now, Prof. Rao raised an interesting point with regard to the re-assignment of the copyright of a publication. It is quite true that in this country authors, under very difficult circumstances sometimes, part with their works for practically nothing. They are being exploited by the publishers. There is no denying that fact, and it was with this in view that in the original Bill, the Government put forward a proposal that after a period of seven years, the author could get back the copyright. This question was very thoroughly examined in the Joint Committee, and there were representatives in it of the various interests, including the authors themselves. The Committee felt that if this provision for the re-assignment of the copyright to the author was accepted, it would work against the interests of the authors themselves. The argument was that the publisher in the earlier stages makes an investment. He spends some money on advertisement, in order to capture the market. When a book is published, the publisher has to spend some money for two or three years, and just when it becomes popular and brings him a good return, the author will come to him and say, ""Look here, will you please return this book to me?"" If the publisher is so uncertain about the future of the book, if the publisher is always uncertain about his publication and if he knows that after a period of seven years he is not going to get any return for the investment he has made, do you think that any publisher would ever take any interest in pushing that book in the market? After all, business is business and publishing is a business and we should not ignore this hard reality. As I said, we have full sympathies with the authors but, at the same time, we must remember that without the help of the publishers, the interests of authors will not be promoted." },
  { name: "Transcription No: 144", text: "Sir, I am thankful to the hon. Members who have participated in this debate and generally welcomed the measure before the House. This amending measure of the Motor Vehicles Act, as hon. Members may perhaps recollect, has had a very chequered career and, in fact, this amending process started ten years back. It went to the Select Committee stage and a certain finality was given to it at that time. Then, it could not be pushed through. Later, events made it necessary for further changes to be made in the amending measure and I should think that this amending Bill has come at a very opportune moment before the House when the whole emphasis in the context of our planning is on the development of more and more transport capacity. I should like hon. Members to view this question in that aspect, and if they do so, they will find that this Bill provides for, and enables, various steps to be taken so that transport capacity can be fully developed. There was some mention about nationalisation and I thought the opposition to it, if any, was very mild and had become thoroughly modified in the course of these few months. It has come to stay and that has been very well realised by hon. Members who were not perhaps so happy as others regarding this question of nationalisation. So, let us consider what is the task that is to be done in the country—rail, road and so on. There is a huge task to be performed by all these. They have to go hand in hand and perform this huge task. It is well known that the rail transport capacity that will be generated in the course of the next few years will not be able to move all the traffic. We have said so on several occasions. The allotment of resources for the purpose of railway planning and development falls very much short of the requirements. Even as per the original targets, the Railways have to expand their capacity by about forty-two or forty-three million tonnes and the additional traffic that will be generated was calculated as sixty and odd million tonnes. So, even as per the original targets, there was a gap of seventeen to eighteen million tonnes. Now, certain targets have undergone an upward revision, for instance, for cement production. It is roughly calculated that the cost of the Railway Plan will have to go up by another Rs. one hundred crores to move these additional fifty million tonnes. So, when there is so much to move and when there is so much traffic offering, there is no question of conflict between rail and road transport. Rail and road transport have to join hands and lift the traffic that will be generated. Viewed from this angle, it will be found that there is no conflict. One hon. Member referred to this matter and said that the Railways should not adopt a dog in the manger policy. I have no difficulty in agreeing with him. The Railways do not propose to follow a dog in the manger policy. Perhaps, the hon. Member does not know that we have taken various steps towards relaxation of restrictions on inter-regional transport which he was mentioning. He spoke from experience and said that he was a member of one Regional Transport Authority. Even as far back as nineteen fifty-four, this subject was considered and State Governments were advised to relax the restrictions that they were having both on private carriers and public carriers. They were asked to give the utmost freedom to private carriers. Perhaps, the position is not very well realised that in our country the majority of the trucks are only public carriers. In other advanced industrialised countries, the majority are private carriers. It has been brought out in the report of the Study Group, which went into this question, that perhaps seventy to eighty per cent of the total number of trucks are in private hands. Here also, in our country the various industrial establishments, new and old, can really go in for owning and operating private carriers. They can own a large fleet and can have workshop facilities also and they need not complain against the Railways for not carrying things. So, the indication is that private industries and new plants and new units that are going to be set up can very well go in for owning a large fleet of carriers which can carry goods over small distances. Of course, over very long distances, it may not be possible to operate private carriers, though even there it will be possible to operate over long distances to some extent. So, there is no question of any conflict, as I said, between rail transport and road transport. Coming to road transport, let us see whether the nationalisation policy of the State Governments comes in the way of expansion of private road transport." },
  { name: "Transcription No: 145", text: "Mr. Chairman, I wish to support this Bill not because this is really a measure which will improve the conditions under which these institutions have come into existence in our country but because I feel even a small thing like this which will regulate the running of these homes might do some temporary good. If we examine the reasons why these homes have come into existence, we will find that it is really a reflection on the social backwardness, because women are not educated, because women do not have the right to own property, because women are deserted, neglected, and are driven to the necessity of going into these homes run by the men in our society. These people run these homes under the guise of public charity, but these homes in our cities have really become centres of immoral traffic. These institutions are not only not run by the State as they should be, but they are run by religious and semi-religious bodies, by the so-called public-spirited men in our country, and as has been pointed out just now, it is stated in the report of the Committee appointed by the Ministry of Welfare that they are even being financed by State funds, grants made by the Ministry of Welfare are used by such institutions for unethical purposes. I do not know how we will be able to control them by passing a Bill like this, which will give them some kind of supervision by the State. Sir, I was personally connected with an institution in Uttar Pradesh and it was an institution which was run under the name of Mahila Ashram, and the entire Mahila Committee in control of that Mahila Ashram consisted of some of the lawyers and doctors of the capital of Uttar Pradesh. The means by which they secured the finance to run this institution will prove on what basis this institution is running. For every month that an inmate spends in that home, the prospective husband will have to pay at the rate of so many rupees per month. The only idea of this institution is to get the inmates married, and once they are married, they do not keep a record of the marriage. They do not keep any record of what happens to the inmates after marriage. Everybody knows that they are taken to other provinces by the operating gangs. Sir, one of the institutions quoted in that report is worth mentioning here. The Committee went to Gaya in Bihar and they found that these women were practically locked up as if they were prisoners in that house, and then they were asked as to how many of them would like to stay there. Twelve out of the sixteen ran out of the house. This is typical not of a few but of the majority of the houses run under the name of women's homes or under the grand name of Mahila Ashrams. Only the other day in The Times of India, we read about the financial aid of the Ministry of Welfare to a children's home run just to give a grant to an institution because it bears the name of women and children, even when it is supervised by a visiting committee or visiting men, does not really mean that we are solving the problem. In fact, we in our country, lakhs and lakhs of rupees are wasted by giving indiscriminate grants to semi-institutional welfare bodies which are either run by semi-religious or social private bodies, and I think the Government, if not private Members, should bring forward a Bill which would be for the abolition or total suppression of these homes. The only way to suppress the mishandling of this problem is to suppress these homes. Another thing I want to point out is that these homes flourish in a large way in those areas where social customs have militated against women. We don't find these homes flourishing with such popularity or in such large numbers in other parts of India, say, in Maharashtra or Madhya Pradesh or in the South, where women have a good deal of freedom and educational opportunities, where social customs don't militate against the status of women. Therefore, we should pay increasing attention not only to giving Bills like this but also to giving grants adequate, perhaps better, opportunities for women to have education. It is not the woman who can stand on her own legs, goes there or who is being exploited by these people. It is the weaker women who are ignorant and who don't know what is right or wrong, that are being given false promises and taken to these homes and then handled like goods by the exploiter. Therefore, I support this motion because there is nothing else to do, and I hope that the rule making powers will be exercised in such a way that the control of the Government on these institutions might be tightened."},
  { name: "Transcription No: 146", text: "Now, Sir, when the Tenth Five Year Plan was under discussion, I happened to be a member of the Committee of Parliament which was dealing with resources, and I happened to belong to that school which thought that the target of the Seventh Five Year Plan was much too big for our resources, internal as well as external, and the alternative that I, along with others who agreed with me, suggested was that we should fix a series of priorities and cut down those which were non-essential and that, in the alternative, we should extend the period of the Plan to six years or seven years. Parliament, after debating the whole issue, unanimously agreed in both the Houses that the targets of the Tenth Five Year Plan, as laid down by the Planning Commission, should be carried out. When Parliament came to that decision, it had before it the minute of dissent written by Prof. Rao as well as by one of the Members of the Planning Commission. Both these gentlemen had also warned that the target of the Plan was much too big for the resources of this country. However, Parliament took that decision, and after that decision, we had a general election in the country. The Tenth Five Year Plan was before the country, and the country, by an overwhelming majority, approved the Plan and returned this Party in greater numbers in the Lok Sabha this time than was the case last time. Therefore, it is too late in the day to ask the Finance Minister or the Government of India to scale down the targets of the Tenth Five Year Plan. We, as a people and also as a Parliament, are now committed to the execution of this Plan, wherein a target of Rs. forty-eight thousand crores was fixed. It is now, I believe, increased to Rs. fifty-two thousand crores or Rs. fifty-four thousand crores. Now, when we have agreed on that basic point, then we must find the resources to implement that Plan. For some time, we had also debated the question of deficit financing which, of course, is a euphemism in modern parlance for the printing of notes. When we need money, we issue Treasury Bills, and notes are issued by the Reserve Bank. This sort of thing cannot continue for ever. We must be prepared to make whatever sacrifices are needed to implement the Tenth Plan. Therefore, I submit that the Plan target with these two assumptions, namely, that the Plan target has got to be implemented and, secondly, the deficit financing has got to be avoided and both in the interests of the economy as well as of progress, we are left with only one option, viz., to impose taxes. I know that our present Finance Minister, Dr. Manmohan Singh, is a man of conviction and, what is more important, has the courage of his conviction. That is why, I think, in living memory, he is the one Finance Minister who has come out with this bold and courageous plan of imposing taxation to the tune of Rs. one thousand crores in one single year. To impose taxes of the dimension of Rs. one thousand crores in one single year requires tremendous courage and I must congratulate him for the step that he has taken because it was the least that any Finance Minister could do in the circumstances which I have just narrated. With the imposition of these taxes, the uncovered deficit dwindles down from Rs. five hundred crores. That itself is a great help. I believe, the Government should take immediate steps. When we are taking drastic measures to tax every sector of society, from the rich to the poor, it becomes a duty, in fact a trust, that the money that we raise is spent as carefully and as economically as possible. In the general elections, I too had, along with other hon. Members of our Party and other Parties also, to go into the country, to the villages and towns and everywhere. The people did not mind these taxes but the grievance is that some of the money is being wasted. There was the grievance with regard to corruption on the lower levels of officialdom and, what is more, that there was considerable wastage. Every official, even a small official, seems to be having a jeep or a Maruti and is running about burning petrol and spending on T.A.s, D.A.s, etc., and the work is being rushed through in the months of February and March in order that the grant may not lapse as if the taxpayer's money were meant to be sacrificed ruthlessly and mercilessly, whatever happens. Therefore, it becomes necessary for the Government, both at the Centre and in the States, at all levels, to see that all the money raised and spent in these Plans is fully utilised."},
  { name: "Transcription No: 147", text: "Sir, from my little experience of the rural areas, I can say that growing of food is not a paying proposition to the agriculturists unless and until the prices of foodgrains are guaranteed. Ours is a marginal production, and we have to see whether this marginal production is to be stepped up to the point of self-sufficiency, in which case we have to see whether the producer needs any protection, whether guarantees can be given as regards the prices of foodgrains, whether parity of prices can be maintained for foodgrains vis-a-vis industrial products in our country. If these factors are not taken into consideration, then Sir, poverty will not be liquidated, and unless and until we take the food problem as the vital problem of the nation, I think we will be day by day disappointed in our attempts to relieve the food situation. The food situation is becoming grave because our fast expanding money economy has put more money in the pockets of the people. I have no quarrel with it because the country needs to give relief to persons who are not well placed in life. But this money economy has played havoc with producers in agriculture because after all in India even now more than seventy-five per cent of the people depend on agriculture, and if there is a great disparity in income between the industrial labour and agricultural labour, the agricultural labour has no incentive, the small holder has no incentive to produce more. Besides, growing foodgrains, as I said, is not a paying proposition. Various State Governments have also abolished the Grow More Food Acts. Especially in Maharashtra, there is an Act called the Grow More Food Act of nineteen fifty-five. It lays down certain restrictions on the grower to assign more land for food production. That restriction having been removed now, the farmer is an individualist in his crop planning and he does not care what crop the country needs but he cares more for whether the crop is a paying proposition. It is a natural human tendency that unless and until the business is remunerative, nobody follows it seriously. Though this tendency is found not only in India but everywhere, yet the agriculturist faces this question all the more. Sir, our revered Prime Minister made a nation-wide appeal that India should follow co-operative farming. Sir, co-operative farming still remains a dead letter though there have been several eminent persons who have advocated the importance of co-operative farming. One of the serious problems which has been dealt with is the food situation in the country. The President's Address very rightly remarked that though it is not alarming, still it is serious. It is of grave concern. The economy in the country is also not very safe. All these are stark realities which the country and the leaders of society, as we are in this August House, will have to face. This august House and also the several Houses in the States have given their approval to the Tenth Five Year Plan. It has been in its first year of progress and is already working, though its progress may be slow for several reasons beyond the control of the Government of India. However, the food situation in the country indicates, as the statistics given by the Ministry of Agriculture show, that there is a steady increase in the production and, as such, they have sounded a note of cautious optimism though it may not have been appreciated by several critics as well as several people in the country, because of the rising trend of prices during the last two or three months clearly goes to show that the food situation is not satisfactory. I do not venture to say that it is deteriorating, but as somebody has remarked, the food situation appears to be a little grave because of lack of purchasing power of the consumer. In regard to food production, there are three factors. One is the producer, the other is the non-producer; and the third is the Government. The producer in this country is mainly the agriculturist. And it is time to think seriously positively whether in this country agriculture should have the pride of place ahead of industry because it is the main industry of the nation. There is a clear distinction between agriculture and industry. And as it has been better said by an eminent economist, there cannot be industry unless there is an improved agriculture. An improved agriculture needs several factors to be considered before we assail the producer in the country. Fortunately, very many speakers who preceded me have sponsored the cause of the producer, though the producer in this country can be divided into three categories."},
  { name: "Transcription No: 148", text: "Sir, in order to understand the Government's food policy, we have to go back to some years. Soon after the country attained Independence and the Congress Government assumed power, they realised that the food problem has to be given very serious consideration and for this purpose they appointed senior most Ministers to be in charge of this portfolio. The first Minister was our first President, Dr. Rajendra Prasad. He was followed by Shri Jairamdas Daulatram and then by Mr. Munshi. All these big Ministers could not be very successful as far as food production was concerned. Eventually, Shri Rafi Ahmed Kidwai was put in charge of this portfolio and his imagination, ability and push proved that this problem was not insoluble, but that if this question could be tackled with imagination and foresight, it could be solved. But it was the misfortune of the country that Shri Kidwai is not with us any more and we have fallen and more into statistics than on the realities of the situation. When the First Five Year Plan was brought into being, the main emphasis was laid on food production, and quite rightly too, and we had the river valley projects, dams, hydro-electric projects and so on with a view to increasing food production in the country. Now, if we see the statistics of the various State Governments and also of the Centre about the acreage brought under cultivation and if we go into this matter, we will find that according to the calculations given by the various State Governments and the Centre, the acreage brought under cultivation is many times more than the total cultivable area in India. In spite of that, what have we been seeing? We have been seeing that as far as meeting food problem is concerned, we are far away from meeting all our requirements. Not only that, but some of the Government spokesmen responsible for this matter have been saying that the First Five Year Plan had been successful in increasing food production in the country to a very great extent. They were even planning as to how best the extra food could be exported so that we would be able to get our hard pressed foreign exchange more easily. But, in fact, the position has been just the reverse after the Congress Government assumed power. Then came the First Five Year Plan and we were assured that more food had been produced. And, as I said, if we analyse the statistics of the various States and the Centre, we will find that more acreage has been brought under cultivation than what is actually available in India. The Second Five Year Plan, of course, lays emphasis on industrialisation. Originally, it was estimated that under the Second Plan, there would be twenty-five per cent increase in food production, but the Prime Minister insisted that twenty-five per cent increase was not sufficient and that it should be something like forty per cent. Last year, at the Food Ministers Conference at Mussoorie, they wanted more funds in order to ensure forty per cent increase but the Prime Minister put his foot down saying that not a single rupee would be given, but that the forty per cent increase would have to be achieved. But Sir, forty per cent increase would have to be achieved as if by a magic wand; these things were to be achieved easily. Sir, if we examine the various measures taken for this food production, and other things, we see that for the Grow More Food campaigns and other things, lakhs and crores and crores of rupees have been given to the various States. Various amounts have been advanced to them for the purpose of bringing more acreage under cultivation, and if we go deeply into this matter, we will see that large sums of money were advanced for developing mechanised farming but that money was spent for other purposes. But similarly, for that purpose, it was advanced but it was not spent for that purpose. Therefore, it is quite natural that the situation in regard to food production should be what it is. Now, what is the present position? We have been told by the Food Ministry that production has actually increased, and in the statement which the Food Minister made here very cleverly, only the average production has been shown. But if we go into the figures of actual production, we will see that actually the food production has been on the decline. Sir, in the month of March, a White Paper was issued by the Food Ministry in which the figures of actual production were given, and here I would like to quote a few figures which they had given. If we again see the statistics of the Food Ministry, we will see that availability of foodgrains per capita does not show any rise, while demand per capita is increasing because the population is growing."},
  { name: "Transcription No: 149", text: "Sir, we are all aware of the need for fulfilling our commitments as far as the Seventh Five Year Plan is concerned. I am sure everyone is also willing to sacrifice for the cause of the country, a cause which must override all individual, communal, provincial or even petty political considerations within our borders. Money has to be found and found primarily within our own borders, for, in the long run, a nation has to stand on its own strength. The Finance Minister has, therefore, rightly said that everyone, rich and poor, has to shoulder the great burden if we are to achieve our aims and objectives. But while everyone is, and must be willing to put his shoulder to the wheel, he can only do as much as is commensurate with his strength and what will be the consequences if the burden is more than any sector can bear? The cost of living has gone up considerably. We are told that prices have gone up because the purchasing power of the people has increased pari passu with the rise in prices? I doubt it very much. I am not an economist but I did learn that deficit financing will always cause inflation, and if that is so, the more we go in for deficit financing, the higher will the prices of commodities soar for the poor financiers. As a woman, I admit that with the large majority of my sex, I know nothing in regard to the theory of high finance. But as a woman, I also have to meet household expenditure and I am not at all sure that women do not know how best to make two ends meet but I fear that the present proposals may be going to make it very hard and, in fact, impossible for those who are poor, and the large majority in this country are poor. I am glad to read in the papers that kerosene oil has been left out by the Finance Minister but he is taxing heavily such other things as the poor man needs like cloth, sugar, tea, foodgrains, etc. They are not commodities whose prices can be sent up. I wonder if something could be done to stop its adulteration. Now, food cannot continue to be doled out to the poor for ever with promises of subsidy, whether by Rs. two hundred crores which the hon. Finance Minister is going to put aside for supplementing the food needs of the nation or by fair price shops. Production in every sphere can never produce an answer but an under-nourished person can never produce. Why has the lowest income rate for taxation been lowered to the extent of making life still harder for the poor man? I think everybody who has anything to do with expenditure today realises that Rs. one thousand per month for a family is nothing at all and a man who has got to feed himself, his wife and three or four children and perhaps his father and mother who are dependent on him. How can he possibly pay taxation on this small income? The price of the post card too has been raised. Why? The rise in railway fares too has been going to hit him. The poor, Sir, should be made less poor. That should be the objective of every Government but I fear greatly that the present Budget proposals are going almost the other way in many directions on the assumption of the fulfilment of a plan which might itself break on the rock of finance. Sir, I have said I do not believe in destructive criticism or, at any rate, I said I would offer some constructive criticism. Now, there is no one who is raising money but will be willing to listen in his efforts to raise money to other ways and means which will not hit the poor so hard. Instead of raising the price of the stamped post card rate, why cannot the price of the stamped envelope be raised from one rupee to two rupees? I would not mind even if the cost of the reply post card was raised to one rupee but I object strongly to the cost of the single post card, whether local or internal, being increased. I do not know what the yield from such a measure is, that is, raising the tax on the post card. I believe I am right in saying that our civil aviation rates are les
